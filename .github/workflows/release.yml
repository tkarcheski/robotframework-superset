name: Release

# Publishing is a single, owner-gated action:
#   * push a tag matching v*  (e.g. `git tag v0.1.0 && git push origin v0.1.0`), or
#   * run this workflow manually (Actions -> Release -> Run workflow).
# Authentication to PyPI uses Trusted Publishing (OIDC) — there is NO long-lived
# API token in repository secrets. The one-time owner setup is documented in
# docs/RELEASING.md. The `pypi` environment adds a second gate the owner can use
# to require manual approval before the upload step runs.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege at the top; the publish job elevates id-token for OIDC only.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Never publish from a fork of this repo.
    if: github.repository == 'tkarcheski/robotframework-superset'
    environment:
      name: pypi
      url: https://pypi.org/project/robotframework-superset/
    permissions:
      # Required for Trusted Publishing (OIDC); no username/password/token used.
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
