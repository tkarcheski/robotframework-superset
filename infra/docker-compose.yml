# Local stack for robotframework-superset: PostgreSQL + Redis + Superset.
#
# Quick start:
#   cp ../.env.example ../.env     # edit credentials
#   docker compose --env-file ../.env up -d
#   open http://localhost:8088     # Superset (admin / $SUPERSET_ADMIN_PASSWORD)
#
# The DB sink (robotframework_superset.sinks.db.DatabaseSink) writes events to
# the same PostgreSQL instance Superset reads.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rfs}
    ports:
      - "${POSTGRES_PORT:-5433}:${POSTGRES_INTERNAL_PORT:-5432}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rfs-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rfs}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis 7 has no auth — bind to loopback only, never expose off-host.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - rfs-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  superset-init:
    build: ./superset
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-generate-a-random-secret-here}
      POSTGRES_USER: ${POSTGRES_USER:-rfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rfs}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT:-5432}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.local}
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py:ro
      - ./superset/bootstrap_dashboards.py:/app/bootstrap_dashboards.py:ro
    networks:
      - rfs-net
    entrypoint: /bin/bash
    command:
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin \
          --username "$SUPERSET_ADMIN_USER" \
          --firstname Admin --lastname User \
          --email "$SUPERSET_ADMIN_EMAIL" \
          --password "$SUPERSET_ADMIN_PASSWORD" || true &&
        superset init &&
        python /app/bootstrap_dashboards.py &&
        echo "=== Superset init + bootstrap complete ==="
    restart: "no"

  superset:
    build: ./superset
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_CONFIG_PATH: /app/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-generate-a-random-secret-here}
      POSTGRES_USER: ${POSTGRES_USER:-rfs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rfs}
      POSTGRES_INTERNAL_PORT: ${POSTGRES_INTERNAL_PORT:-5432}
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/superset_config.py:ro
      - ./superset/bootstrap_dashboards.py:/app/bootstrap_dashboards.py:ro
    networks:
      - rfs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

networks:
  rfs-net:
    driver: bridge

volumes:
  pgdata:
