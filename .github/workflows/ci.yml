name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install the db extra too so the DB keyword-library tests run for real
      # (they SQLite-skip without SQLAlchemy).
      - name: Install
        run: pip install -e ".[dev,db]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest -q
      # Structural gate for the migrated Robot suites (issue #10): parse only,
      # no live Superset/Postgres required.
      - name: Robot dryrun
        run: robot --dryrun -o NONE -l NONE -r NONE robot/
